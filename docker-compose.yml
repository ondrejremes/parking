services:
  app:
    build: .
    container_name: parking
    # .env is mounted and loaded by python-dotenv — avoids Docker Compose
    # expanding $ signs in bcrypt hashes when using env_file
    environment:
      DATABASE_URL: postgresql://parking:parking@db/parking
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env:ro
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: parking-db
    environment:
      POSTGRES_DB: parking
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
