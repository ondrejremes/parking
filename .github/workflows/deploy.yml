name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESOURCE_GROUP: parking-rg
  ACR_NAME: parkingacr
  APP_NAME: parking

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC login to Azure
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEPLOY }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push image to ACR
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$APP_NAME:$IMAGE_TAG" \
            --image "$APP_NAME:latest" \
            .

      - name: Deploy Bicep infrastructure
        env:
          IMAGE_TAG: ${{ github.sha }}
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >
            infra/parameters/prod.bicepparam
            containerImage=${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
            azureClientId=${{ secrets.AZURE_CLIENT_ID_APP }}
            azureClientSecret=${{ secrets.AZURE_CLIENT_SECRET_APP }}
            sessionSecret=${{ secrets.SESSION_SECRET }}
            adminUsername=${{ secrets.ADMIN_USERNAME }}
            adminPasswordHash=${{ secrets.ADMIN_PASSWORD_HASH }}
            acsConnectionString=${{ secrets.ACS_CONNECTION_STRING }}
          failOnStdErr: false

      - name: Update Container App image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$APP_NAME:$IMAGE_TAG"
